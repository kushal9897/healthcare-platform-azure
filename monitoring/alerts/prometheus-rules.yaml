###############################################################################
# Prometheus Alert Rules - Healthcare Platform
###############################################################################
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: healthcare-platform-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
    # --- SLO Burn Rate Alerts ---------------------------------------------
    - name: slo-burn-rate
      rules:
        - alert: PatientServiceHighBurnRate
          expr: |
            (
              sum(rate(http_requests_total{service="patient-service",code=~"5.."}[1h]))
              /
              sum(rate(http_requests_total{service="patient-service"}[1h]))
            ) > (14.4 * 0.0005)
          for: 2m
          labels:
            severity: critical
            service: patient-service
            team: platform
          annotations:
            summary: "Patient Service SLO burn rate is critical"
            description: "Error budget consumption is 14.4x normal. {{ $value | humanizePercentage }} error rate."
            runbook_url: "https://docs.healthcare.internal/runbooks/high-burn-rate"

        - alert: ClinicalServiceHighBurnRate
          expr: |
            (
              sum(rate(http_requests_total{service="clinical-service",code=~"5.."}[1h]))
              /
              sum(rate(http_requests_total{service="clinical-service"}[1h]))
            ) > (14.4 * 0.001)
          for: 2m
          labels:
            severity: critical
            service: clinical-service
          annotations:
            summary: "Clinical Service SLO burn rate is critical"
            runbook_url: "https://docs.healthcare.internal/runbooks/high-burn-rate"

    # --- Golden Signals ---------------------------------------------------
    - name: golden-signals
      rules:
        - alert: HighLatencyP99
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)
            ) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "P99 latency above 2s for {{ $labels.service }}"
            description: "P99 latency is {{ $value }}s"

        - alert: HighErrorRate
          expr: |
            sum(rate(http_requests_total{code=~"5.."}[5m])) by (service)
            /
            sum(rate(http_requests_total[5m])) by (service)
            > 0.01
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Error rate above 1% for {{ $labels.service }}"

        - alert: HighSaturationCPU
          expr: |
            avg(rate(container_cpu_usage_seconds_total{namespace=~"healthcare-.*"}[5m]))
            by (pod)
            /
            avg(kube_pod_container_resource_limits{resource="cpu",namespace=~"healthcare-.*"})
            by (pod)
            > 0.85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "CPU utilization above 85% for {{ $labels.pod }}"

        - alert: HighSaturationMemory
          expr: |
            avg(container_memory_working_set_bytes{namespace=~"healthcare-.*"})
            by (pod)
            /
            avg(kube_pod_container_resource_limits{resource="memory",namespace=~"healthcare-.*"})
            by (pod)
            > 0.90
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Memory utilization above 90% for {{ $labels.pod }}"

    # --- Infrastructure ---------------------------------------------------
    - name: infrastructure
      rules:
        - alert: PodCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace=~"healthcare-.*"}[1h]) > 5
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is crash looping"
            runbook_url: "https://docs.healthcare.internal/runbooks/pod-crash-loop"

        - alert: PodNotReady
          expr: |
            kube_pod_status_ready{condition="true",namespace=~"healthcare-.*"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} is not ready"

        - alert: PersistentVolumeSpaceLow
          expr: |
            kubelet_volume_stats_available_bytes{namespace=~"healthcare-.*"}
            /
            kubelet_volume_stats_capacity_bytes{namespace=~"healthcare-.*"}
            < 0.15
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "PV space below 15% for {{ $labels.persistentvolumeclaim }}"

        - alert: CertificateExpiringSoon
          expr: |
            (certmanager_certificate_expiration_timestamp_seconds - time()) / 86400 < 30
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Certificate {{ $labels.name }} expires in {{ $value | humanize }} days"
