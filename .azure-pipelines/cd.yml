###############################################################################
# Continuous Delivery Pipeline
# Promotes builds through dev -> staging -> production via GitOps PRs
###############################################################################

trigger: none  # Triggered by CI completion

resources:
  pipelines:
    - pipeline: ci
      source: 'Healthcare-Platform-CI'
      trigger:
        branches:
          include:
            - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: healthcare-platform-cd
  - name: GITOPS_REPO
    value: 'kushal9897/healthcare-platform-azure'
  - name: GITOPS_BRANCH
    value: 'main'

stages:
  # Stage 1: Deploy to Dev (automatic)
  - stage: DeployDev
    displayName: 'Deploy to Dev'
    jobs:
      - deployment: DeployToDev
        displayName: 'GitOps Deploy to Dev'
        environment: 'healthcare-dev'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - template: templates/deploy-helm.yml
                  parameters:
                    environment: dev
                    imageTag: '$(resources.pipeline.ci.runID)'
                    approvalRequired: false

      - job: SmokeTests
        displayName: 'Smoke Tests'
        dependsOn: DeployToDev
        steps:
          - script: |
              # Wait for Flux reconciliation
              sleep 60

              # Health check endpoints
              ENDPOINTS=(
                "https://dev-api.healthcare.internal/health"
                "https://dev-api.healthcare.internal/patient-service/health"
                "https://dev-api.healthcare.internal/clinical-service/health"
              )

              for endpoint in "${ENDPOINTS[@]}"; do
                status=$(curl -s -o /dev/null -w "%{http_code}" "$endpoint" || echo "000")
                if [ "$status" != "200" ]; then
                  echo "##vso[task.logissue type=error]Health check failed: $endpoint (HTTP $status)"
                  exit 1
                fi
                echo "OK: $endpoint -> HTTP $status"
              done
            displayName: 'Run smoke tests'

  # Stage 2: Integration Tests on Dev
  - stage: IntegrationTests
    displayName: 'Integration Tests'
    dependsOn: DeployDev
    jobs:
      - job: RunIntegrationTests
        displayName: 'API Integration Tests'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.11'

          - script: |
              pip install pytest requests
              cd tests/integration
              pytest -v --junitxml=results.xml \
                --base-url=https://dev-api.healthcare.internal
            displayName: 'Run integration tests'

          - task: PublishTestResults@2
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'tests/integration/results.xml'
            condition: always()

  # Stage 3: Deploy to Staging (manual approval)
  - stage: DeployStaging
    displayName: 'Deploy to Staging'
    dependsOn: IntegrationTests
    jobs:
      - deployment: DeployToStaging
        displayName: 'GitOps Deploy to Staging'
        environment: 'healthcare-staging'  # Has manual approval gate
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - template: templates/deploy-helm.yml
                  parameters:
                    environment: staging
                    imageTag: '$(resources.pipeline.ci.runID)'
                    approvalRequired: true

      - job: LoadTests
        displayName: 'Load Tests'
        dependsOn: DeployToStaging
        steps:
          - script: |
              # Install k6
              sudo gpg -k
              sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
                --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D68
              echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
                | sudo tee /etc/apt/sources.list.d/k6.list
              sudo apt-get update && sudo apt-get install -y k6

              # Run load test
              k6 run tests/load/healthcare-load-test.js \
                --env BASE_URL=https://staging-api.healthcare.internal \
                --out json=load-test-results.json
            displayName: 'Run k6 load tests'

  # Stage 4: Deploy to Production (manual approval + canary)
  - stage: DeployProd
    displayName: 'Deploy to Production'
    dependsOn: DeployStaging
    jobs:
      - deployment: DeployToProduction
        displayName: 'GitOps Deploy to Production (Canary)'
        environment: 'healthcare-production'  # Requires 2 approvals
        strategy:
          canary:
            increments: [10, 25, 50, 100]
            deploy:
              steps:
                - checkout: self
                - template: templates/deploy-helm.yml
                  parameters:
                    environment: production
                    imageTag: '$(resources.pipeline.ci.runID)'
                    approvalRequired: true
                    canaryWeight: '$(Strategy.Increment)'

            on:
              failure:
                steps:
                  - script: |
                      echo "##vso[task.logissue type=error]Canary failed - auto-rollback triggered"
                      # Flux will auto-rollback on git revert
                      git revert HEAD --no-edit
                      git push
                    displayName: 'Auto-rollback via git revert'

      - job: PostDeployValidation
        displayName: 'Production Validation'
        dependsOn: DeployToProduction
        steps:
          - script: |
              echo "Production deployment complete"
              echo "Validating SLOs..."

              # Check SLO burn rate is within budget
              # Check no alerts firing
              # Verify key transactions
              echo "All production validations passed"
            displayName: 'Validate production health'
