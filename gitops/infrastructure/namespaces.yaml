---
apiVersion: v1
kind: Namespace
metadata:
  name: healthcare-dev
  labels:
    environment: dev
    compliance: hipaa
    istio-injection: enabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: healthcare-staging
  labels:
    environment: staging
    compliance: hipaa
    istio-injection: enabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: healthcare-production
  labels:
    environment: production
    compliance: hipaa
    istio-injection: enabled
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    purpose: observability
---
apiVersion: v1
kind: Namespace
metadata:
  name: ingress-system
  labels:
    purpose: networking
