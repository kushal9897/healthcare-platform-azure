---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: healthcare-platform
  namespace: flux-system
spec:
  interval: 1m
  ref:
    branch: main
  url: https://github.com/kushal9897/healthcare-platform-azure
  secretRef:
    name: github-credentials
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  sourceRef:
    kind: GitRepository
    name: healthcare-platform
  path: ./gitops/infrastructure
  prune: true
  wait: true
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 5m
  retryInterval: 1m
  dependsOn:
    - name: infrastructure
  sourceRef:
    kind: GitRepository
    name: healthcare-platform
  path: ./gitops/apps/overlays/dev
  prune: true
  wait: true
  timeout: 5m
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: patient-service
      namespace: healthcare-dev
    - apiVersion: apps/v1
      kind: Deployment
      name: clinical-service
      namespace: healthcare-dev
