###############################################################################
# Kubernetes RBAC - Least-Privilege Service Accounts
###############################################################################

# --- Patient Service ---------------------------------------------------------
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: patient-service
  namespace: healthcare-production
  annotations:
    azure.workload.identity/client-id: "${PATIENT_SERVICE_CLIENT_ID}"
  labels:
    azure.workload.identity/use: "true"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: patient-service-role
  namespace: healthcare-production
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["healthcare-secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: patient-service-binding
  namespace: healthcare-production
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: patient-service-role
subjects:
  - kind: ServiceAccount
    name: patient-service
    namespace: healthcare-production

