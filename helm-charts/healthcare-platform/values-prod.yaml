###############################################################################
# Production Environment Overrides
###############################################################################

global:
  imageRegistry: "acrhealthcareprod.azurecr.io"
  environment: production
  domain: api.healthcare.com

patient-service:
  replicaCount: 3
  autoscaling:
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilization: 60
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi
  podDisruptionBudget:
    minAvailable: 2

clinical-service:
  replicaCount: 3
  autoscaling:
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilization: 55
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 4000m
      memory: 4Gi
  podDisruptionBudget:
    minAvailable: 2

notification-service:
  replicaCount: 2
  autoscaling:
    minReplicas: 2
    maxReplicas: 10

analytics-service:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8

ingress:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "500"
    nginx.ingress.kubernetes.io/limit-connections: "50"
  hosts:
    - host: api.healthcare.com
      paths:
        - path: /patient
          service: patient-service
          port: 8000
        - path: /clinical
          service: clinical-service
          port: 8001
        - path: /notifications
          service: notification-service
          port: 8002
        - path: /analytics
          service: analytics-service
          port: 8003
  tls:
    - secretName: prod-healthcare-tls
      hosts:
        - api.healthcare.com
