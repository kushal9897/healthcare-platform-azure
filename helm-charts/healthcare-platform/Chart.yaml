apiVersion: v2
name: healthcare-platform
description: Healthcare AI Platform - Umbrella Helm Chart
type: application
version: 1.0.0
appVersion: "1.0.0"

keywords:
  - healthcare
  - azure
  - fhir
  - ai
  - microservices

maintainers:
  - name: Platform Engineering
    email: platform@healthcare.dev

dependencies:
  - name: patient-service
    version: "1.0.0"
    condition: patient-service.enabled
  - name: clinical-service
    version: "1.0.0"
    condition: clinical-service.enabled
  - name: notification-service
    version: "1.0.0"
    condition: notification-service.enabled
  - name: analytics-service
    version: "1.0.0"
    condition: analytics-service.enabled
